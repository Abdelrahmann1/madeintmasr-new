<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لك | SODIC</title>
    <link href="assets/img/logo.webp" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', Arial, sans-serif;
            background: linear-gradient(135deg, #f7f7f7 0%, #eef1f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .thank-you {
            background: #fff;
            padding: 48px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap { margin-bottom: 24px; }
        .logo-wrap img { max-width: 140px; height: auto; }

        .check-icon {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fa7f28, #ff9a4a);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            font-size: 44px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(250, 127, 40, 0.35);
            animation: pop 0.5s ease-out 0.2s both;
        }

        @keyframes pop {
            0%   { transform: scale(0); }
            70%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #31353d;
            margin: 0 0 14px;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            color: #5a5f6a;
            line-height: 1.9;
            margin-bottom: 30px;
        }

        .home-btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: #fa7f28;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background-color: #31353d;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 480px) {
            .thank-you { padding: 32px 20px; }
            h1 { font-size: 22px; }
            p  { font-size: 14px; }
            .home-btn { font-size: 14px; padding: 12px 24px; }
            .check-icon { width: 70px; height: 70px; font-size: 36px; }
        }
    </style>
</head>

<body>
    <div class="thank-you">
        <div class="logo-wrap">
            <img src="assets/img/logo.webp" alt="SODIC">
        </div>
        <div class="check-icon">&#10003;</div>
        <h1>شكراً لتسجيلك مع SODIC</h1>
        <p>تم إرسال بياناتك بنجاح، وسيتواصل معك أحد مستشارينا العقاريين في أقرب وقت لتقديم كل التفاصيل عن مشروعات SODIC.</p>
        <a href="index.html" class="home-btn">العودة إلى الصفحة الرئيسية</a>
    </div>
</body>

</html>
